<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Software Engineer & Product Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --border: #222220;
    --text: #e8e6e0;
    --muted: #6b6860;
    --accent: #c8f060;
    --accent2: #f0a040;
    --card: #141412;
    --tag-bg: #1a1a18;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.hover { width: 40px; height: 40px; background: var(--accent); }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
  }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 0;
    background: rgba(10,10,8,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    animation: slideDown 0.6s ease forwards;
  }
  @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .nav-inner {
    max-width: 1100px; margin: 0 auto; padding: 0 32px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 1.2rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 120px 0 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 70% 50%, rgba(200,240,96,0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(240,160,64,0.04) 0%, transparent 60%);
  }

  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  }

  .hero-content { position: relative; z-index: 2; }

  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.7s 0.3s ease forwards;
  }

  .hero-name {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.7s 0.5s ease forwards;
  }
  .hero-name em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-role {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    color: var(--muted);
    font-style: italic;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.7s 0.65s ease forwards;
  }

  .hero-bio {
    max-width: 520px;
    font-size: 1.05rem;
    color: #a09e98;
    line-height: 1.75;
    margin-bottom: 48px;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.7s 0.8s ease forwards;
  }

  .hero-actions {
    display: flex; gap: 16px; flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.7s 0.95s ease forwards;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    border-radius: 4px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.05);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .btn:hover::before { transform: translateX(0); }

  .btn-primary {
    background: var(--accent);
    color: #0a0a08;
    font-weight: 500;
  }
  .btn-primary:hover { background: #d8ff70; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,240,96,0.25); }

  .btn-secondary {
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); transform: translateY(-2px); }

  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0;
    animation: fadeUp 0.7s 1.3s ease forwards;
  }
  .hero-scroll span {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .scroll-line {
    width: 1px; height: 48px;
    background: linear-gradient(to bottom, var(--muted), transparent);
    animation: scrollPulse 2s infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ABOUT / STACK */
  .section {
    padding: 100px 0;
    border-top: 1px solid var(--border);
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 48px;
    display: flex; align-items: center; gap: 16px;
  }
  .section-label::after {
    content: '';
    flex: 1; max-width: 80px;
    height: 1px;
    background: var(--border);
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .about-text h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }
  .about-text h2 em { font-style: italic; color: var(--accent); }
  .about-text p {
    color: #a09e98;
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 16px;
  }

  .stack-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .stack-item {
    background: var(--card);
    padding: 20px 24px;
    transition: background 0.2s;
  }
  .stack-item:hover { background: #1a1a18; }
  .stack-category {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stack-techs {
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 300;
    line-height: 1.6;
  }

  /* PROJECTS */
  .projects-list { display: flex; flex-direction: column; gap: 2px; }

  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: start;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    cursor: none;
  }
  .project-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s;
    transform-origin: top;
  }
  .project-card:hover {
    border-color: rgba(200,240,96,0.2);
    transform: translateX(4px);
    background: #161614;
  }
  .project-card:hover::before { transform: scaleY(1); }

  .project-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .project-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.8rem;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    transition: color 0.2s;
  }
  .project-card:hover .project-title { color: var(--accent); }

  .project-desc {
    color: #a09e98;
    font-size: 0.95rem;
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 20px;
    max-width: 560px;
  }

  .project-impact {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent2);
    margin-bottom: 20px;
    padding: 8px 12px;
    background: rgba(240,160,64,0.08);
    border-radius: 4px;
    display: inline-block;
  }

  .project-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 12px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .project-links {
    display: flex; flex-direction: column; gap: 10px;
    min-width: 120px;
    align-items: flex-end;
  }
  .project-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .project-link:hover { color: var(--accent); border-color: var(--accent); }
  .project-link svg { width: 12px; height: 12px; }

  /* CONTACT */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .contact-left h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .contact-left h2 em { font-style: italic; color: var(--accent); }
  .contact-left p {
    color: #a09e98;
    font-size: 1rem;
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 32px;
  }

  .contact-links {
    display: flex; flex-direction: column; gap: 1px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .contact-link {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px;
    background: var(--card);
    text-decoration: none;
    color: var(--text);
    transition: background 0.2s;
    border-bottom: 1px solid var(--border);
  }
  .contact-link:last-child { border-bottom: none; }
  .contact-link:hover { background: #1a1a18; }
  .contact-link-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-
